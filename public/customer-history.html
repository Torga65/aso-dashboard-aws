  <!-- File extraction libraries (lazy-loaded on first binary upload) -->
  <script>
    // Extracts plain text from a File object. Returns { text, fileName } where
    // fileName may be renamed to .txt for binary formats.
    window.extractFileText = async function(file) {
      const ext = file.name.split('.').pop().toLowerCase();

      if (['vtt','txt','csv'].includes(ext)) {
        return { text: await file.text(), fileName: file.name };
      }

      if (ext === 'pdf') {
        const pdfjsLib = await loadScript(
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js',
          'pdfjsLib'
        );
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const bytes = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
        const pages = [];
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const tc = await page.getTextContent();
          pages.push(tc.items.map(s => s.str).join(' '));
        }
        return { text: pages.join('\n\n'), fileName: file.name.replace(/\.pdf$/i, '.txt') };
      }

      if (ext === 'docx') {
        const mammoth = await loadScript(
          'https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js',
          'mammoth'
        );
        const bytes = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer: bytes });
        return { text: result.value, fileName: file.name.replace(/\.docx$/i, '.txt') };
      }

      if (['xlsx','xls'].includes(ext)) {
        const XLSX = await loadScript(
          'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
          'XLSX'
        );
        const bytes = await file.arrayBuffer();
        const wb = XLSX.read(bytes, { type: 'array' });
        const lines = [];
        wb.SheetNames.forEach(name => {
          lines.push(`=== Sheet: ${name} ===`);
          const ws = wb.Sheets[name];
          lines.push(XLSX.utils.sheet_to_csv(ws));
        });
        return { text: lines.join('\n\n'), fileName: file.name.replace(/\.(xlsx|xls)$/i, '.txt') };
      }

      // Fallback — try reading as text
      return { text: await file.text(), fileName: file.name };
    };

    // Load a script by URL and return the global it exposes
    const _scriptCache = {};
    function loadScript(url, globalName) {
      if (window[globalName]) return Promise.resolve(window[globalName]);
      if (_scriptCache[url]) return _scriptCache[url];
      _scriptCache[url] = new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = url;
        s.onload = () => resolve(window[globalName]);
        s.onerror = () => reject(new Error(`Failed to load ${url}`));
        document.head.appendChild(s);
      });
      return _scriptCache[url];
    }
  </script>
</head>
<body>

    <!-- Controls -->
    <div class="controls" id="controls" style="display: none;">
      <a href="/customer-history-edit" class="btn-edit-customer" id="edit-customer-btn" target="_top">Edit / Add customer</a>
      <a href="/reports.html" class="btn-edit-customer" style="background:#667eea;color:white;border-color:#667eea;">Reports</a>
      <div class="controls-search-wrap" style="flex: 1; min-width: 260px; display: flex; flex-direction: column; gap: 4px;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <label for="natural-search">Search:</label>
          <input type="text" id="natural-search" placeholder="e.g. canonical auto-fix enabled, pending validation, hreflang disabled, inactive" aria-label="Search across all customer fields" style="flex: 1;"/>
          <button type="button" id="natural-search-btn" class="controls-search-btn">Search</button>
        </div>

        <label for="customer-search-input">Select Customer:</label>

          <option value="">All</option>
        </select>
      </div>
      <button type="button" id="ese-filter-toggle" class="ese-filter-btn" style="display:none;">My Customers</button>
    </div>
    
    <!-- ESE welcome banner (shown after login if user is identified as an ESE) -->

    <!-- Timeline Display -->
    <div id="timeline-display"></div>
  </main>
  <footer></footer>
  
  <script type="module">
    let allData = [];
    let rawData = []; // all records across all weeks, pre-collapse
    let weeks = [];
    // ESE filter: when non-null, only show customers whose eseLead matches this value.
    // Set automatically on login when the signed-in user appears as an ESE.
    let eseFilter = null;       // the active eseLead string being filtered on, or null = all
    let eseIdentity = null;     // the eseLead value matched to the signed-in user (persists across toggle)

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = String(s ?? '');
      return div.innerHTML;
    }

    function collapseToOneRecordPerCustomer(rows) {
      const byCustomer = {};
      rows.forEach((r) => {
        const name = (r.companyName || '').trim();
        if (!name) return;
        const existing = byCustomer[name];
        const week = (r.week || '').toString();
        if (!existing || week.localeCompare((existing.week || '').toString()) > 0) {
          byCustomer[name] = { ...r };
        }
      });
      return Object.values(byCustomer);
    }

    // ── SpaceCat natural-language query parser ──────────────────────────────
    // Maps human-readable aliases to canonical audit type IDs
    const AUDIT_TYPE_ALIASES = [
      { aliases: ['broken backlinks', 'broken-backlinks', 'backlinks'], type: 'broken-backlinks' },
      { aliases: ['structured data', 'structured-data'], type: 'structured-data' },
      { aliases: ['meta tags', 'meta-tags', 'metatags'], type: 'meta-tags' },
      { aliases: ['alt text', 'alt-text', 'alttext'], type: 'alt-text' },
      { aliases: ['internal linking', 'internal-linking'], type: 'internal-linking' },
      { aliases: ['hreflang'], type: 'hreflang' },
      { aliases: ['canonical'], type: 'canonical' },
    ];

    function detectAuditTypeInQuery(q) {
      for (const { aliases, type } of AUDIT_TYPE_ALIASES) {
        if (aliases.some((a) => q.includes(a))) return type;
      }
      return null;
    }

    /**
     * Parse a query string for SpaceCat-specific filter intent.
     * Returns an array of filter objects, or null if no SpaceCat intent detected.
     */
    function parseSpaceCatFilters(query) {
      const q = query.toLowerCase();
      const filters = [];
      const auditType = detectAuditTypeInQuery(q);
      const hasAutoFix = /auto[-\s]?fix/.test(q);
      const wantsEnabled = /\b(enabled|on|yes)\b/.test(q);
      const wantsDisabled = /\b(disabled|off|no)\b/.test(q);
      const hasPendingValidation = /pending[\s-]?validat/.test(q);
      const hasNoLogin = /\b(no[ -]login|no[ -]sign[ -]?in|inactive|never logged)\b/.test(q);
      const hasDisabledAudits = /disabled audit/.test(q);

      if (hasAutoFix && (wantsEnabled || wantsDisabled)) {
        filters.push({ kind: 'autofix', auditType, enabled: wantsEnabled });
      } else if (!hasAutoFix && auditType && wantsDisabled) {
        filters.push({ kind: 'audit-disabled', auditType });
      } else if (!hasAutoFix && auditType && wantsEnabled) {
        filters.push({ kind: 'audit-enabled', auditType });
      }

      if (hasPendingValidation) {
        filters.push({ kind: 'pending-validation', auditType: auditType || null });
      }

      if (hasDisabledAudits && !auditType) {
        filters.push({ kind: 'has-disabled-audits' });
      }

      if (hasNoLogin) {
        filters.push({ kind: 'no-login' });
      }

      return filters.length > 0 ? filters : null;
    }

    function getSpaceCatCache() {
      try {
        const raw = localStorage.getItem('aso_quickref_cache');
        return raw ? JSON.parse(raw) : {};
      } catch { return {}; }
    }

    function spaceCatFilterMatches(entry, filters) {
      return filters.every((f) => {
        if (f.kind === 'autofix') {
          const audits = entry.audits || [];
          if (f.auditType) {
            const audit = audits.find((a) => a.auditType === f.auditType);
            if (!audit) return false;
            return f.enabled ? audit.autoFix === 'Yes' : audit.autoFix === 'No';
          }
          return audits.some((a) => (f.enabled ? a.autoFix === 'Yes' : a.autoFix === 'No'));
        }
        if (f.kind === 'audit-disabled') {
          return (entry.disabledAudits || []).includes(f.auditType);
        }
        if (f.kind === 'audit-enabled') {
          return (entry.audits || []).some((a) => a.auditType === f.auditType)
            && !(entry.disabledAudits || []).includes(f.auditType);
        }
        if (f.kind === 'has-disabled-audits') {
          return (entry.disabledAudits || []).length > 0;
        }
        if (f.kind === 'pending-validation') {
          const pv = entry.pendingValidationOpps;
          if (!pv || pv.count === 0) return false;
          if (f.auditType) return (pv.types || []).includes(f.auditType);
          return true;
        }
        if (f.kind === 'no-login') {
          return !Array.isArray(entry.users) || entry.users.length === 0;
        }
        return true;
      });
    }

    function updateSearchHint(filters, matchCount, uncachedCount) {
      const hint = document.getElementById('search-hint');
      if (!hint) return;
      if (!filters) { hint.style.display = 'none'; hint.textContent = ''; return; }
      hint.style.display = '';
      hint.textContent = uncachedCount > 0
        ? `${matchCount} match${matchCount !== 1 ? 'es' : ''}. ${uncachedCount} customer${uncachedCount !== 1 ? 's' : ''} skipped (no cached data — select and click Refresh to include).`
        : `${matchCount} match${matchCount !== 1 ? 'es' : ''} from SpaceCat cache.`;
    }
    // ────────────────────────────────────────────────────────────────────────

    const SEARCH_STOP_WORDS = new Set(['a', 'an', 'the', 'and', 'or', 'but', 'in', 'on', 'at', 'to', 'for', 'of', 'with', 'by', 'from', 'as', 'is', 'are', 'was', 'were', 'be', 'been', 'being', 'have', 'has', 'had', 'do', 'does', 'did', 'will', 'would', 'could', 'should', 'may', 'might', 'must', 'shall', 'can', 'need', 'dare', 'ought', 'used', 'show', 'me', 'all', 'that', 'those', 'these', 'which', 'what', 'where', 'when', 'who', 'how', 'customers', 'customer']);
    const BOOLEAN_FIELDS = new Set(['headless', 'preflight', 'autoOptimizeEnabled', 'autoOptimizeButtonPressed', 'servicePrincipleDeployed', 'brandProfile', 'aemyDeployed', 'customerSelfServe']);
    const SEARCH_ALIASES = {
      autoOptimizeEnabled: ['autofix', 'auto-fix', 'auto optimize', 'autooptimize'],
      autoOptimizeButtonPressed: ['auto optimize button', 'autooptimize button'],
    };

    function buildSearchableString(record) {
      const parts = [];
      Object.entries(record).forEach(([key, value]) => {
        const v = String(value ?? '').trim().toLowerCase();
        if (BOOLEAN_FIELDS.has(key)) {
          if (v === 'yes' || v === 'true' || v === '1') {
            parts.push(key);
            const aliases = SEARCH_ALIASES[key];
            if (aliases) parts.push(...aliases);
          }
        } else {
          parts.push(key, v);
        }
      });
      return parts.join(' ').toLowerCase();
    }

    function recordMatchesSearch(record, query) {
      const q = (query || '').trim().toLowerCase();
      if (!q) return true;
      const words = q.split(/\s+/).filter((w) => w.length >= 2 && !SEARCH_STOP_WORDS.has(w));
      if (words.length === 0) return true;
      const searchable = buildSearchableString(record);
      return words.every((word) => searchable.includes(word));
    }

    function applyQueryFilters(customers) {
      const query = (document.getElementById('natural-search')?.value || '').trim();
      if (!query) { updateSearchHint(null); return customers; }

      const spaceCatFilters = parseSpaceCatFilters(query);
      if (spaceCatFilters) {
        const cache = getSpaceCatCache();
        let uncached = 0;
        const filtered = customers.filter((name) => {
          const entry = cache[name];
          if (!entry) { uncached += 1; return false; }
          return spaceCatFilterMatches(entry, spaceCatFilters);
        });
        updateSearchHint(spaceCatFilters, filtered.length, uncached);
        return filtered;
      }

      updateSearchHint(null);
      return customers.filter((name) => {
        const record = allData.find((c) => c.companyName === name);
        return record ? recordMatchesSearch(record, query) : false;
      });
    }

    function getFilteredCustomers() {
      const licenseType = document.getElementById('license-type-select')?.value;
      let visible = allData.filter((c) => !c.hidden);
      // ESE filter: narrow to customers assigned to the signed-in ESE
      if (eseFilter) {
        const ese = eseFilter.trim().toLowerCase();
        visible = visible.filter((c) => (c.eseLead || '').trim().toLowerCase() === ese);
      }
      let customers;
      if (!licenseType) {
        customers = [...new Set(visible.map((c) => c.companyName))].sort();
      } else {
        customers = [...new Set(visible.filter((c) => (c.licenseType || '').trim() === licenseType).map((c) => c.companyName))].sort();
      }
      return applyQueryFilters(customers);
    }

    /**
     * Update the "My Customers / All Customers" toggle button visibility and label
     * to reflect the current eseFilter state.
     */
    function updateEseToggle() {
      const btn = document.getElementById('ese-filter-toggle');
      if (!btn) return;
      if (!eseIdentity) { btn.style.display = 'none'; return; }
      btn.style.display = 'inline-flex';
      if (eseFilter) {
        btn.textContent = 'All Customers';
        btn.title = 'Showing only your assigned customers — click to view all';
        btn.classList.add('ese-filter-btn--active');
      } else {
        btn.textContent = 'My Customers';
        btn.title = 'Click to show only your assigned customers';
        btn.classList.remove('ese-filter-btn--active');
      }
    }

    /**
     * Show or clear the welcome banner for the signed-in user.
     */
    function updateWelcomeBanner(profile, customerCount) {
      let banner = document.getElementById('ese-welcome-banner');
      if (!banner) return;
      if (!profile) { banner.style.display = 'none'; return; }
      const displayName = profile.displayName || profile.name || profile.email || '';
      if (eseIdentity) {
        banner.style.display = 'flex';
        banner.innerHTML = `Welcome back, <strong>${escapeHtml(displayName)}</strong>! Showing your ${customerCount} assigned customer${customerCount !== 1 ? 's' : ''}.`;
      } else {
        banner.style.display = 'flex';
        banner.innerHTML = `Welcome back, <strong>${escapeHtml(displayName)}</strong>! No customers are assigned to you — showing all customers.`;
      }
    }

    /**
     * Given an IMS profile, check whether the user appears as an eseLead on any
     * customer record. If so, activate the ESE filter automatically and show a
     * welcome message. If no match, show all customers with a welcome message.
     */
    function detectAndApplyEseFilter(profile) {
      if (!profile || !allData.length) return;
      // Build name candidates from every variant the profile exposes
      const candidates = [
        profile.displayName,
        profile.name,
        profile.email ? profile.email.split('@')[0].replace(/[._]/g, ' ') : null,
      ].filter(Boolean).map((s) => s.trim().toLowerCase());

      const matched = allData
        .map((c) => (c.eseLead || '').trim())
        .find((ese) => ese && candidates.some((c) => ese.toLowerCase() === c));

      eseIdentity = matched || null;
      eseFilter = eseIdentity; // auto-activate "My Customers" view on login
      showAllCustomers();
      updateEseToggle();
      const count = getFilteredCustomers().length;
      updateWelcomeBanner(profile, count);
    }

    async function loadHistoricalData() {
      try {
        // Always fetch fresh from API — remove any stale localStorage cache
        localStorage.removeItem('aso_customer_history_data');
        const response = await fetch('/api/customers');
        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error || `API error ${response.status}`);
        }
        const data = await response.json();
        rawData = data.data || [];
        allData = rawData;
        const rawLength = allData.length;
        const weeksForStats = [...new Set(allData.map(c => c.week))].filter(Boolean).sort();
        // One record per customer (latest only)
        allData = collapseToOneRecordPerCustomer(allData);
        weeks = allData.length ? ['Current'] : [];
        console.log(`Loaded ${allData.length} customers (latest info only)`);
        
        // Get unique license types and populate License Type dropdown
        const licenseTypes = [...new Set(allData.map(c => (c.licenseType || '').trim()).filter(Boolean))].sort();
        const licenseSelect = document.getElementById('license-type-select');
        licenseTypes.forEach(lt => {
          const option = document.createElement('option');
          option.value = lt;
          option.textContent = lt;
          licenseSelect.appendChild(option);
        });
        if (licenseTypes.includes('Paid')) {
          licenseSelect.value = 'Paid';
        }
        
        displaySummaryStats();
        const summaryEl = document.getElementById('summary-stats');
        if (summaryEl) summaryEl.style.display = 'grid';
        
        const VIEW_ALL_VALUE = '__view_all__';
        const customerSearchInput = document.getElementById('customer-search-input');
        const customerSelectHidden = document.getElementById('customer-select');
        const customerDropdown = document.getElementById('customer-dropdown');

        function syncVisibleFromHidden() {
          const v = customerSelectHidden.value;
          customerSearchInput.value = v === VIEW_ALL_VALUE ? 'View All' : (v || '');
        }

        function showCustomerDropdown() {
          const q = (customerSearchInput.value || '').trim().toLowerCase();
          const customers = getFilteredCustomers();
          const filtered = q ? customers.filter((n) => n.toLowerCase().includes(q)) : customers;
          const items = [`<li role="option" data-value="${VIEW_ALL_VALUE}">View All</li>`];
          if (filtered.length > 0) {
            items.push(...filtered.map((n) => `<li role="option" data-value="${escapeHtml(n)}">${escapeHtml(n)}</li>`));
          } else if (q) {
            items.push('<li data-empty>No matching customer</li>');
          }
          customerDropdown.innerHTML = items.join('');
          customerDropdown.classList.add('show');
          customerDropdown.querySelectorAll('li:not([data-empty])').forEach((li) => {
            li.addEventListener('click', () => {
              const val = li.dataset.value || '';
              customerSelectHidden.value = val;
              customerSearchInput.value = val === VIEW_ALL_VALUE ? 'View All' : val;
              customerDropdown.classList.remove('show');
              customerSelectHidden.dispatchEvent(new Event('change', { bubbles: true }));
            });
          });
        }

        function populateCustomerDropdown(defaultToViewAll = false) {
          const customers = getFilteredCustomers();
          const currentValue = customerSelectHidden.value;
          if (defaultToViewAll) {
            customerSelectHidden.value = VIEW_ALL_VALUE;
          } else if (currentValue && currentValue !== VIEW_ALL_VALUE && customers.includes(currentValue)) {
            customerSelectHidden.value = currentValue;
          } else if (currentValue === VIEW_ALL_VALUE) {
            customerSelectHidden.value = VIEW_ALL_VALUE;
          } else if (customers.length > 0) {
            customerSelectHidden.value = customers[0];
            displayCustomerTimeline(customers[0]);
          }
          syncVisibleFromHidden();
        }

        populateCustomerDropdown(true);

        customerSearchInput.addEventListener('focus', (e) => {
          showCustomerDropdown();
          e.target.select();
        });
        customerSearchInput.addEventListener('input', showCustomerDropdown);
        customerSearchInput.addEventListener('blur', () => {
          setTimeout(() => {
            customerDropdown.classList.remove('show');
            syncVisibleFromHidden();
          }, 200);
        });

        customerSelectHidden.addEventListener('change', (e) => {
          const value = e.target.value;
          if (value === VIEW_ALL_VALUE) {
            showAllCustomers();
          } else if (value) {
            displayCustomerTimeline(value);
          }
        });

        document.getElementById('license-type-select').addEventListener('change', () => {
          populateCustomerDropdown();
          const sel = document.getElementById('customer-select');
          if (sel.value === VIEW_ALL_VALUE) {
            showAllCustomers();
          } else if (sel.value) {
            displayCustomerTimeline(sel.value);
          }
        });
        const metricSelectEl = document.getElementById('metric-select');
        if (metricSelectEl) {
          metricSelectEl.addEventListener('change', () => {
            const sel = document.getElementById('customer-select');
            const val = sel ? sel.value : '';
            if (val === VIEW_ALL_VALUE) showAllCustomers();
            else if (val) displayCustomerTimeline(val);
          });
        }

        function applySearchFilter() {
          populateCustomerDropdown();
          const sel = document.getElementById('customer-select');
          if (sel.value === VIEW_ALL_VALUE) {
            showAllCustomers();
          } else if (sel.value) {
            const customers = getFilteredCustomers();
            if (customers.includes(sel.value)) {
              displayCustomerTimeline(sel.value);
            } else {
              sel.value = customers.length ? customers[0] : VIEW_ALL_VALUE;
              syncVisibleFromHidden();
              if (sel.value === VIEW_ALL_VALUE) showAllCustomers();
              else displayCustomerTimeline(sel.value);
            }
          }
        }

        const searchInput = document.getElementById('natural-search');
        const searchBtn = document.getElementById('natural-search-btn');
        if (searchInput) {
          searchInput.addEventListener('input', applySearchFilter);
          searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); applySearchFilter(); }
          });
        }
        if (searchBtn) searchBtn.addEventListener('click', applySearchFilter);
        
        window.addEventListener('customer-quick-ref-token-applied', () => {
          const container = document.getElementById('timeline-display');
          if (!container || typeof window.loadCustomerQuickRef !== 'function') return;
          const sel = document.getElementById('customer-select');
          const currentValue = sel ? sel.value : '';
          if (currentValue === VIEW_ALL_VALUE) {
            container.querySelectorAll('.view-all-accordion-item.expanded').forEach((item) => {
              const customerName = item.getAttribute('data-customer-name');
              const body = item.querySelector('.view-all-accordion-body');
              if (customerName && body) window.loadCustomerQuickRef(body, customerName);
            });
          } else if (currentValue) {
            const timeline = container.querySelector('.customer-timeline');
            if (timeline && timeline.getAttribute('data-customer-name')) {
              window.loadCustomerQuickRef(timeline, currentValue);
            }
          }
        });
        
        // Show controls
        document.getElementById('loading').style.display = 'none';
        document.getElementById('controls').style.display = 'flex';

        // Wire the ESE toggle button (only visible when the user is an identified ESE)
        const eseToggleBtn = document.getElementById('ese-filter-toggle');
        if (eseToggleBtn) {
          eseToggleBtn.addEventListener('click', () => {
            eseFilter = eseFilter ? null : eseIdentity;
            updateEseToggle();
            showAllCustomers();
          });
        }

        // onAuthReady fires immediately if the IMS token is already present, otherwise
        // fires once when the token arrives — covers both fast and slow postMessage delivery.
        if (typeof window.onAuthReady === 'function') {
          window.onAuthReady((profile) => detectAndApplyEseFilter(profile));
        }

        // Re-detect on subsequent sign-in / sign-out events
        if (typeof window.onAuthStateChange === 'function') {
          window.onAuthStateChange((profile) => {
            eseIdentity = null;
            eseFilter = null;
            updateEseToggle();
            updateWelcomeBanner(null, 0);
            detectAndApplyEseFilter(profile);
          });
        }

        // Check for ?customer= URL param and auto-select that customer
        const urlParams = new URLSearchParams(window.location.search);
        const preCustomer = urlParams.get('customer');
        if (preCustomer && allData.some((c) => c.companyName === preCustomer)) {
          customerSelectHidden.value = preCustomer;
          syncVisibleFromHidden();
          displayCustomerTimeline(preCustomer);
        } else {
          showAllCustomers();
        }
        
      } catch (error) {
        console.error('Error loading data:', error);
        document.getElementById('loading').innerHTML =

    function createTimelineTable(customerData) {
      const metricSelect = document.getElementById('metric-select');
      const metricValue = metricSelect ? metricSelect.value : 'all';
      // Columns matching the CustomerSnapshot fields from the ServiceNow daily sync
      const allColumns = [
        'week', 'status', 'licenseType', 'industry', 'eseLead', 'deploymentType',
        'imsOrgId', 'tenantId', 'terminationReason', 'comments',
        'sourceLastUpdated', 'ingestedAt', 'dataSource'
      ];
      const engagementCols = [
        'week', 'status', 'engagement', 'healthScore', 'blockers', 'feedback', 'mau', 'ttiv'
      ];
      const businessCols = [
        'week', 'licenseType', 'industry', 'eseLead', 'status', 'deploymentType'
      ];
      const snowCols = [
        'week', 'imsOrgId', 'tenantId', 'terminationReason', 'comments',
        'sourceLastUpdated', 'ingestedAt', 'dataSource'
      ];
      let columns = allColumns;
      if (metricValue === 'engagement') columns = engagementCols;
      if (metricValue === 'business') columns = businessCols;
      if (metricValue === 'snow') columns = snowCols;
      
      const headers = columns.map(col => COLUMN_LABELS[col] || formatColumnName(col));
      
      let html = '<div class="timeline-container"><table class="timeline-table">';
      html += '<thead><tr>';
      html += headers.map(h => `<th>${h}</th>`).join('');
      html += '</tr></thead><tbody>';
      
      customerData.forEach((record, idx) => {
        const prevRecord = idx > 0 ? customerData[idx - 1] : null;
        
        html += '<tr>';
        columns.forEach(col => {
          let value = record[col] || '';
          let cellClass = '';
          let trendIndicator = '';
          
          if (col === 'week') {
            cellClass = 'week-col';
            value = value ? formatWeek(value) : value;
          } else if (col === 'sourceLastUpdated' || col === 'ingestedAt') {
            if (value) {
              const d = new Date(value);
              value = isNaN(d.getTime()) ? value : d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            }
          } else if (col === 'comments' && value && value.length > 80) {
            value = `<span title="${escapeHtml(value)}">${escapeHtml(value.slice(0, 80))}…</span>`;
          } else if (prevRecord) {
            const prevValue = prevRecord[col] || '';
            if (value !== prevValue) {
              cellClass = 'changed';
              
              // Determine if change is improvement or decline
              if (col === 'healthScore') {
                const curr = Number(value) || 0;
                const prev = Number(prevValue) || 0;
                if (curr > prev) {
                  cellClass = 'improved';
                  trendIndicator = '<span class="trend-indicator trend-up">↑</span>';
                } else if (curr < prev) {
                  cellClass = 'declined';
                  trendIndicator = '<span class="trend-indicator trend-down">↓</span>';
                }
              } else if (col === 'engagement') {
                const levels = { 'Active': 3, 'At Risk': 2, 'Critical': 1 };
                const curr = levels[value] || 0;
                const prev = levels[prevValue] || 0;
                if (curr > prev) {
                  cellClass = 'improved';
                  trendIndicator = '<span class="trend-indicator trend-up">↑</span>';
                } else if (curr < prev) {
                  cellClass = 'declined';
                  trendIndicator = '<span class="trend-indicator trend-down">↓</span>';
                }
              }
            }
          }
          
          html += `<td class="${cellClass}">${value}${trendIndicator}</td>`;
        });
        html += '</tr>';
      });
      
      html += '</tbody></table></div>';
      return html;
    }
    
    function formatColumnName(col) {
      return col
        .replace(/([A-Z])/g, ' $1')
        .replace(/^./, str => str.toUpperCase())
        .trim();
    }
    
    function analyzeCustomerHistory(customerData) {
      const insights = [];
      const first = customerData[0];
      const last = customerData[customerData.length - 1];
      
      // Health score trend
      const firstHealth = Number(first.healthScore) || 0;
      const lastHealth = Number(last.healthScore) || 0;
      const healthChange = lastHealth - firstHealth;
      
      if (healthChange > 10) {
        insights.push(`Health score improved by ${healthChange} points (${firstHealth} → ${lastHealth})`);
      } else if (healthChange < -10) {
        insights.push(`Health score declined by ${Math.abs(healthChange)} points (${firstHealth} → ${lastHealth})`);
      } else {
        insights.push(`Health score stable around ${lastHealth}`);
      }
      
      // Status progression
      if (first.status !== last.status) {
        insights.push(`Status changed from ${first.status} to ${last.status}`);
      }
      
      // Engagement trend
      const engagementLevels = customerData.map(d => d.engagement);
      const activeCount = engagementLevels.filter(e => e === 'Active').length;
      const atRiskCount = engagementLevels.filter(e => e === 'At Risk').length;
      const criticalCount = engagementLevels.filter(e => e === 'Critical').length;
      
      if (activeCount || atRiskCount || criticalCount) {
        insights.push(`Engagement: Active ${activeCount}, At Risk ${atRiskCount}, Critical ${criticalCount}`);
      }
      
      // Implementation progress
      const implementations = ['autoOptimizeEnabled', 'servicePrincipleDeployed', 'brandProfile', 'aemyDeployed'];
      const firstCount = implementations.filter(impl => first[impl] && first[impl].toLowerCase() === 'yes').length;
      const lastCount = implementations.filter(impl => last[impl] && last[impl].toLowerCase() === 'yes').length;
      
      if (lastCount > firstCount) {
        insights.push(`Implementation progress: ${lastCount - firstCount} new features enabled`);
      }
      
      return insights;
    }

    function exportHistory() {
      const headers = [
        'Week', 'Company Name', 'License Type', 'Industry', 'ESE Lead', 'Status',
        'Delay Reason', 'Close Date', 'Onboard Date', 'Deployment Type', 'Headless',
        'Engagement', 'Blockers', 'Feedback', 'Health Score', 'Summary',
        'MAU', 'TTIV', 'Oppty Realized', 'Preflight', 'Auto-Optimize Enabled',
        'Auto-Optimize Button Pressed', 'Service Principle Deployed', 'Brand Profile',
        'AEMY Deployed', 'Code Repo', 'Auth Implementation', 'Workflow Manager',
        'Customer Self Serve'
      ];
      
      const fields = [
        'week', 'companyName', 'licenseType', 'industry', 'eseLead', 'status',
        'delayReason', 'closeDate', 'onboardDate', 'deploymentType', 'headless',
        'engagement', 'blockers', 'feedback', 'healthScore', 'summary',
        'mau', 'ttiv', 'opptyRealized', 'preflight', 'autoOptimizeEnabled',
        'autoOptimizeButtonPressed', 'servicePrincipleDeployed', 'brandProfile',
        'aemyDeployed', 'codeRepo', 'authImplementation', 'workflowManager',
        'customerSelfServe'
      ];
      
      let csv = headers.join(',') + '\n';
      
      const sortedData = [...allData].sort((a, b) => {
        const nameCompare = a.companyName.localeCompare(b.companyName);
        return nameCompare !== 0 ? nameCompare : (a.week || '').localeCompare(b.week || '');
      });
      
      sortedData.forEach(record => {
        const row = fields.map(field => {
          let value = record[field] || '';
          value = String(value).replace(/"/g, '""');
          if (value.includes(',') || value.includes('\n') || value.includes('"')) {
            value = `"${value}"`;
          }
          return value;
        });
        csv += row.join(',') + '\n';
      });
      
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      const date = new Date().toISOString().split('T')[0];
      
      link.setAttribute('href', url);
      link.setAttribute('download', `customer-history-${date}-${allData.length}-records.csv`);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      
      console.log(`Exported ${allData.length} historical records`);
    }
    
    // Load data on page load
    loadHistoricalData();
  </script>

  <!-- ── Progression Edit Modal ─────────────────────────── -->
  <div class="qr-prog-modal-backdrop" id="qr-prog-modal">
    <div class="qr-prog-modal-box">
      <h3 id="qr-prog-modal-title">Edit Progression Stage</h3>
      <div class="qr-prog-field">
        <label>Track *</label>
        <select id="qr-prog-track">
          <option value="">-- select --</option>
          <option value="Moving">Moving</option>
          <option value="On Hold">On Hold</option>
        </select>
      </div>
      <div class="qr-prog-field">
        <label>Stage *</label>
        <select id="qr-prog-stage"><option value="">-- select track first --</option></select>
      </div>
      <div class="qr-prog-field" id="qr-prog-source-row" style="display:none;">
        <label>Migration Source *</label>
        <select id="qr-prog-source">
          <option value="">-- select --</option>
          <option value="On Prem">On Prem</option>
          <option value="AMS">AMS</option>
        </select>
      </div>
      <div class="qr-prog-field" id="qr-prog-tech-row" style="display:none;">
        <label>Migration Tech *</label>
        <select id="qr-prog-tech">
          <option value="">-- select --</option>
          <option value="AEM">AEM</option>
          <option value="Not AEM">Not AEM</option>
        </select>
      </div>
      <div class="qr-prog-field">
        <label>Stage entered date *</label>
        <input type="date" id="qr-prog-date"/>
      </div>
      <div class="qr-prog-field">
        <label>Notes</label>
        <textarea id="qr-prog-notes" placeholder="Optional context…"></textarea>
      </div>
      <div class="qr-prog-actions">
        <button class="qr-prog-cancel" id="qr-prog-cancel">Cancel</button>
        <button class="qr-prog-save" id="qr-prog-save">Save</button>
      </div>
    </div>
  </div>

  <script>
  /* ── Progression widget for Customer 360 ── */
  (function() {
    const MOVING_STAGES = ['Prod', 'POC', 'Preprod'];
    const ONHOLD_STAGES = ['Future Date', 'Migration'];

    let qrProgCurrentCompany = null;

    function daysSince(dateStr) {
      if (!dateStr) return null;
      const d = new Date(dateStr);
      return Math.floor((Date.now() - d) / 864e5);
    }

    function escH(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Called by customer-history-quick-ref.js after a customer is loaded
    window.loadCustomerProgression = async function(container, companyName) {
      const el = container.querySelector('.qr-progression-content');
      if (!el) return;
      el.innerHTML = '<span style="font-size:12px;color:#aaa;">Loading…</span>';

      try {
        const res = await fetch(`/api/progression?company=${encodeURIComponent(companyName)}`);
        const json = await res.json();
        const data = json.data;

        if (!data) {
          el.innerHTML = `<div class="qr-progression-none">
            <span>Not in pipeline yet.</span>
            <button class="qr-progression-edit-btn" data-company="${escH(companyName)}">+ Set Stage</button>
          </div>`;
        } else {
          const days = daysSince(data.stageEnteredAt);
          const trackClass = data.progressionTrack === 'Moving' ? 'moving' : 'onhold';
          const migExtra = data.migrationSource
            ? ` &nbsp;·&nbsp; ${escH(data.migrationSource)}${data.migrationTech ? ' / ' + escH(data.migrationTech) : ''}`
            : '';

          // Load history async
          let historyHtml = '<span style="font-size:11px;color:#aaa;">Loading history…</span>';

          el.innerHTML = `<div class="qr-progression-wrap">
            <div class="qr-progression-stage-block">
              <span class="qr-progression-track-badge ${trackClass}">${escH(data.progressionTrack)}</span>
              <span class="qr-progression-stage-name">${escH(data.progressionStage)}</span>
              <span class="qr-progression-days">${days !== null ? days + ' days in stage' : ''}${migExtra}</span>
            </div>
            <div class="qr-progression-meta">
              <span>Entered: ${escH(data.stageEnteredAt)}</span>
              <span>Updated by: ${escH(data.updatedBy)}</span>
              ${data.notes ? `<span style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escH(data.notes)}">Notes: ${escH(data.notes)}</span>` : ''}
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-start;">
              <button class="qr-progression-edit-btn" data-company="${escH(companyName)}">Edit Stage</button>
              <a href="/reports.html#pipeline" style="font-size:11px;color:#667eea;text-decoration:none;">View pipeline →</a>
            </div>
            <div class="qr-progression-history">
              <div class="qr-progression-history-title">Stage history</div>
              <div class="qr-prog-hist-entries">${historyHtml}</div>
            </div>
          </div>`;

          // Load history
          fetch(`/api/progression/history?company=${encodeURIComponent(companyName)}`)
            .then(r => r.json())
            .then(j => {
              const entries = (j.data || []).slice(0, 5);
              const histEl = el.querySelector('.qr-prog-hist-entries');
              if (!histEl) return;
              if (entries.length === 0) {
                histEl.innerHTML = '<span style="font-size:11px;color:#aaa;">No history.</span>';
              } else {
                histEl.innerHTML = entries.map(e => `
                  <div class="qr-progression-history-entry">
                    <span class="qr-progression-h-date">${e.changedAt.slice(0,10)}</span>
                    <span class="qr-progression-h-badge">${escH(e.progressionTrack)}</span>
                    <span class="qr-progression-h-badge">${escH(e.progressionStage)}</span>
                    <span style="color:#aaa;">${escH(e.changedBy)}</span>
                  </div>`).join('');
              }
            }).catch(() => {
              const histEl = el.querySelector('.qr-prog-hist-entries');
              if (histEl) histEl.innerHTML = '';
            });
        }

        // Wire edit button
        el.querySelector('.qr-progression-edit-btn')?.addEventListener('click', (e) => {
          openQrProgModal(companyName, data);
        });
      } catch (err) {
        el.innerHTML = `<span style="font-size:12px;color:#c00;">Failed to load progression.</span>`;
      }
    };

    /* Modal logic */
    function updateStageOpts(track) {
      const stages = track === 'Moving' ? MOVING_STAGES : track === 'On Hold' ? ONHOLD_STAGES : [];
      const sel = document.getElementById('qr-prog-stage');
      sel.innerHTML = stages.length
        ? `<option value="">-- select stage --</option>` + stages.map(s => `<option value="${escH(s)}">${escH(s)}</option>`).join('')
        : '<option value="">-- select track first --</option>';
      sel.value = '';
      document.getElementById('qr-prog-source').value = '';
      document.getElementById('qr-prog-tech').value = '';
      updateMigRows('', null);
    }
    function updateMigRows(stage, source) {
      const showSrc = stage === 'Migration';
      const showTch = showSrc && source === 'On Prem';
      document.getElementById('qr-prog-source-row').style.display = showSrc ? 'block' : 'none';
      document.getElementById('qr-prog-tech-row').style.display   = showTch ? 'block' : 'none';
    }
    document.getElementById('qr-prog-track').addEventListener('change', e => updateStageOpts(e.target.value));
    document.getElementById('qr-prog-stage').addEventListener('change', e => updateMigRows(e.target.value, document.getElementById('qr-prog-source').value));
    document.getElementById('qr-prog-source').addEventListener('change', e => updateMigRows('Migration', e.target.value));

    function openQrProgModal(companyName, existing) {
      qrProgCurrentCompany = companyName;
      document.getElementById('qr-prog-modal-title').textContent =
        existing ? `Edit Stage — ${companyName}` : `Set Stage — ${companyName}`;
      document.getElementById('qr-prog-track').value = existing?.progressionTrack || '';
      updateStageOpts(existing?.progressionTrack || '');
      if (existing?.progressionStage) document.getElementById('qr-prog-stage').value = existing.progressionStage;
      document.getElementById('qr-prog-source').value = existing?.migrationSource || '';
      document.getElementById('qr-prog-tech').value   = existing?.migrationTech   || '';
      updateMigRows(existing?.progressionStage || '', existing?.migrationSource || '');
      document.getElementById('qr-prog-date').value  = existing?.stageEnteredAt || new Date().toISOString().slice(0,10);
      document.getElementById('qr-prog-notes').value = existing?.notes || '';
      document.getElementById('qr-prog-modal').classList.add('open');
    }

    document.getElementById('qr-prog-cancel').addEventListener('click', () => {
      document.getElementById('qr-prog-modal').classList.remove('open');
    });
    document.getElementById('qr-prog-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('qr-prog-modal'))
        document.getElementById('qr-prog-modal').classList.remove('open');
    });

    document.getElementById('qr-prog-save').addEventListener('click', async () => {
      const company   = qrProgCurrentCompany;
      const track     = document.getElementById('qr-prog-track').value;
      const stage     = document.getElementById('qr-prog-stage').value;
      const source    = document.getElementById('qr-prog-source').value || null;
      const tech      = document.getElementById('qr-prog-tech').value   || null;
      const date      = document.getElementById('qr-prog-date').value;
      const p         = (typeof getProfile === 'function') ? getProfile() : null;
      const updatedBy = p?.email || p?.displayName || p?.name || 'unknown';
      const notes     = document.getElementById('qr-prog-notes').value.trim() || null;

      if (!company || !track || !stage || !date) {
        alert('Please fill in all required fields.');
        return;
      }
      if (stage === 'Migration' && !source) { alert('Please select a Migration Source.'); return; }
      if (stage === 'Migration' && source === 'On Prem' && !tech) { alert('Please select Migration Tech.'); return; }

      const saveBtn = document.getElementById('qr-prog-save');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';

      try {
        const res = await fetch('/api/progression', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ companyName: company, progressionTrack: track, progressionStage: stage, migrationSource: source, migrationTech: tech, stageEnteredAt: date, updatedBy, notes }),
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);

        document.getElementById('qr-prog-modal').classList.remove('open');
        // Reload the widget
        const container = document.querySelector('.customer-timeline');
        if (container && window.loadCustomerProgression) {
          window.loadCustomerProgression(container, company);
        }
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save';
      }
    });
  })();
  </script>
</body>
</html>
