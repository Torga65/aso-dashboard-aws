version: 1

# ---------------------------------------------------------------------------
# Amplify Gen 2 build spec
# Backend is deployed by the pipeline (ampx pipeline-deploy),
# not by the Amplify Hosting build job — this file only builds the frontend.
# Node 20 LTS is pinned so the lock file and CI use the same npm version.
# ---------------------------------------------------------------------------

backend:
  phases:
    build:
      commands:
        - nvm install 20 && nvm use 20
        - npm install --legacy-peer-deps
        # dev branch shares the stage backend — no separate backend deploy needed
        - |
          if [ "$AWS_BRANCH" = "dev" ]; then
            echo "dev branch: skipping backend deploy, using stage backend"
          else
            npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
          fi

frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20 && nvm use 20
        - npm install --legacy-peer-deps
    build:
      commands:
        # dev branch pulls outputs from stage; all other branches use their own
        - |
          if [ "$AWS_BRANCH" = "dev" ]; then
            npx ampx generate outputs --branch stage --app-id $AWS_APP_ID
          else
            npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID
          fi
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
  environment:
    variables:
      NEXT_TELEMETRY_DISABLED: "1"
