version: 1

# ---------------------------------------------------------------------------
# Amplify Gen 2 build spec
# Backend is deployed by the pipeline (ampx pipeline-deploy),
# not by the Amplify Hosting build job — this file only builds the frontend.
# ---------------------------------------------------------------------------

backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID

frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        # Write Amplify outputs so the Next.js build can read them
        - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
  environment:
    variables:
      NEXT_TELEMETRY_DISABLED: "1"
